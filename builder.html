<!DOCTYPE html>
<html>
<head>
<title>Mantu AI PRO</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0f1a;
  color:white;
  display:flex;
  height:100vh;
}

.sidebar{
  width:260px;
  padding:15px;
  background:#111827;
  overflow:auto;
}

textarea,input{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#4f46e5,#9333ea);
  color:white;
  cursor:pointer;
}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

#tabs{
  display:flex;
  background:#111827;
  padding:5px;
  overflow-x:auto;
}

.tab{
  padding:6px 10px;
  margin-right:5px;
  background:#1f2937;
  border-radius:6px;
  cursor:pointer;
}

.tab.active{
  background:#4f46e5;
}

#editor{
  flex:1;
  background:black;
  color:#00ff00;
  padding:10px;
  overflow:auto;
  outline:none;
  white-space:pre;
}

iframe{
  height:40%;
  background:white;
}

.project-item{
  padding:6px;
  background:#1f2937;
  margin-top:5px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">

<h3>⚡ Mantu AI PRO</h3>

<textarea id="prompt" placeholder="Build full app..."></textarea>
<button onclick="generateFiles()">⚡ Build App</button>

<input id="newFileName" placeholder="new file name">
<button onclick="addFile()">➕ New File</button>
<button onclick="deleteFile()">❌ Delete File</button>

<input id="projectName" placeholder="Project Name">
<button onclick="saveProject()">💾 Save</button>
<button onclick="loadProjects()">📂 Load</button>

<div id="projectList"></div>

<button onclick="downloadZip()">📦 Download ZIP</button>
<button onclick="deployApp()">🚀 Deploy App</button>

<hr>

<h3>ENV Variables</h3>
<textarea id="envInput" placeholder="KEY=VALUE"></textarea>
<button onclick="saveEnv()">💾 Save ENV</button>

<hr>

<input id="chatInput" placeholder="Ask AI...">
<button onclick="chat()">🤖 Send</button>

</div>

<div class="main">
  <div id="tabs"></div>
  <pre id="editor" contenteditable="true"></pre>
  <iframe id="preview"></iframe>
</div>

<script>

let files = {
  "index.html":"<h1>Hello 🚀</h1>",
  "style.css":"body{font-family:sans-serif}",
  "script.js":"console.log('hi')"
}

let currentFile = "index.html"

/* GENERATE */
async function generateFiles(){
  let prompt=document.getElementById("prompt").value

  let res=await fetch("/generate/files",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt})
  })

  let data=await res.json()
  files=data.files || {}
  openFile(Object.keys(files)[0])
  updatePreview()
}

/* TABS */
function renderTabs(){
  let tabs=""
  for(let f in files){
    tabs+=`<div class="tab ${f==currentFile?"active":""}" onclick="openFile('${f}')">${f}</div>`
  }
  document.getElementById("tabs").innerHTML=tabs
}

function openFile(f){
  currentFile=f
  document.getElementById("editor").textContent=files[f]
  renderTabs()
}

/* EDIT */
editor.oninput=()=>{
  files[currentFile]=editor.textContent
  updatePreview()
}

/* PREVIEW */
function updatePreview(){
  let html=files["index.html"]||""
  let css=`<style>${files["style.css"]||""}</style>`
  let js=`<script>${files["script.js"]||""}<\/script>`
  preview.srcdoc=html+css+js
}

/* FILE ADD */
function addFile(){
  let name=document.getElementById("newFileName").value
  if(name){
    files[name]=""
    openFile(name)
  }
}

/* FILE DELETE */
function deleteFile(){
  delete files[currentFile]
  openFile(Object.keys(files)[0])
}

/* SAVE PROJECT */
async function saveProject(){
  let name=document.getElementById("projectName").value || "project"

  await fetch("/save_project",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,files})
  })

  alert("Saved 🔥")
}

/* LOAD PROJECTS */
async function loadProjects(){
  const res = await fetch("/projects");
  const data = await res.json();

  let html = "";
  data.projects.forEach(p => {
    html += `<div class="project-item" onclick="openProject('${p}')">${p}</div>`;
  });

  document.getElementById("projectList").innerHTML = html;
}

/* OPEN PROJECT */
async function openProject(name){
  const res = await fetch(`/load_project/${name}`);
  const data = await res.json();

  files = data.files;
  openFile(Object.keys(files)[0])
  updatePreview()

  loadEnv(name)
}

/* DOWNLOAD ZIP */
async function downloadZip() {
  const name = document.getElementById("projectName").value || "project";

  const res = await fetch("/export_zip", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({name, files})
  });

  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = name + ".zip";
  a.click();
}

/* 🔥 CLEAN SAVE ENV */
async function saveEnv(){

  const project = document.getElementById("projectName").value || "project"
  const raw = document.getElementById("envInput").value

  let env = {}

  raw.split("\n").forEach(line => {
    if(!line.trim()) return

    const [k,v] = line.split("=")
    if(k && v){
      env[k.trim()] = v.trim()
    }
  })

  await fetch("/save_env", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({project, env})
  })

  alert("ENV Saved 🔥")
}

/* LOAD ENV */
async function loadEnv(name){
  let res=await fetch("/get_env/"+name)
  let data=await res.json()

  let text=""
  for(let k in data){
    text+=k+"="+data[k]+"\n"
  }

  document.getElementById("envInput").value=text
}

/* DEPLOY */
async function deployApp(){

  const name = document.getElementById("projectName").value || "mantu-app"

  await fetch("/deploy/github",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,files})
  })

  alert("GitHub Uploaded ✅")

  window.location.href = `/deploy/vercel?name=${name}`
}

/* CHAT */
async function chat(){
  let msg=document.getElementById("chatInput").value

  let res=await fetch("/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  })

  let data=await res.json()
  alert(data.reply)
}

/* INIT */
openFile("index.html")
updatePreview()

</script>

</body>
</html>
