<!DOCTYPE html>
<html>
<head>
<title>Mantu AI Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:sans-serif;
    display:flex;
    height:100vh;
    background:#f5f5f5;
}

/* LEFT PANEL */
.left{
    width:40%;
    background:#ffffff;
    padding:20px;
    overflow:auto;
}

/* RIGHT PANEL */
.right{
    flex:1;
    padding:15px;
}

/* TITLE */
h2{
    margin-bottom:10px;
}

/* PROMPT */
textarea{
    width:100%;
    height:150px;
    border-radius:12px;
    border:1px solid #ddd;
    padding:12px;
    font-size:14px;
}

/* SELECT */
select{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

/* BUTTONS */
button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:black;
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    transform:scale(1.03);
}

/* OUTPUT */
#output{
    margin-top:10px;
    height:40%;
    background:#000;
    color:#0f0;
    padding:10px;
    border-radius:10px;
    overflow:auto;
}

/* PREVIEW */
iframe{
    width:100%;
    height:55%;
    border-radius:10px;
    background:#fff;
    border:none;
}

/* CHAT */
.chat{
    margin-top:15px;
}

.chat input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-top:10px;
}

/* MOBILE FIX */
@media(max-width:768px){
    body{
        flex-direction:column;
    }
    .left{
        width:100%;
        height:50%;
    }
    .right{
        height:50%;
    }
}
</style>
</head>

<body>

<!-- LEFT -->
<div class="left">

<h2>Prompt</h2>

<textarea id="prompt" placeholder="Describe your app..."></textarea>

<select id="lang">
<option value="html">HTML</option>
<option value="python">Python</option>
<option value="node">Node</option>
<option value="flutter">Flutter</option>
<option value="fullstack">Full Stack</option>
</select>

<button onclick="generate()">Generate</button>
<button onclick="fixCode()">Fix Code</button>
<button onclick="runPython()">Run Python</button>
<button onclick="download()">Download</button>

<div class="chat">
<h3>Dev Chat</h3>
<input id="chatInput" placeholder="Ask AI...">
<button onclick="chat()">Send</button>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<iframe id="previewFrame"></iframe>

<pre id="output"></pre>

</div>

<script>

const BASE = "https://mantu-ai.onrender.com"
let currentCode = ""

/* GENERATE */
async function generate(){
  const btn = event.target
  btn.innerText = "Generating..."

  const prompt = document.getElementById("prompt").value
  const lang = document.getElementById("lang").value

  try{
    const res = await fetch(BASE + "/generate/code", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({prompt, lang})
    })

    const data = await res.json()
    currentCode = data.code || "No code generated"

    document.getElementById("output").innerText = currentCode

    preview()

  }catch(err){
    alert("Error generating code")
  }

  btn.innerText = "Generate"
}

/* PREVIEW */
function preview(){
  const iframe = document.getElementById("previewFrame")
  iframe.srcdoc = currentCode
}

/* FIX CODE */
async function fixCode(){
  try{
    const res = await fetch(BASE + "/debug", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({code: currentCode})
    })

    const data = await res.json()
    currentCode = data.fixed || currentCode

    document.getElementById("output").innerText = currentCode
    preview()

  }catch(err){
    alert("Error fixing code")
  }
}

/* RUN PYTHON */
async function runPython(){
  try{
    const res = await fetch(BASE + "/run/python", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({code: currentCode})
    })

    const data = await res.json()
    alert(data.output || data.error)

  }catch(err){
    alert("Error running python")
  }
}

/* DOWNLOAD */
function download(){
  const blob = new Blob([currentCode], {type:"text/plain"})
  const a = document.createElement("a")
  a.href = URL.createObjectURL(blob)
  a.download = "code.txt"
  a.click()
}

/* DEV CHAT */
async function chat(){
  const prompt = document.getElementById("chatInput").value

  try{
    const res = await fetch(BASE + "/dev-chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        prompt,
        code: currentCode
      })
    })

    const data = await res.json()
    currentCode = data.updated_code || currentCode

    document.getElementById("output").innerText = currentCode
    preview()

  }catch(err){
    alert("Chat error")
  }
}

</script>

</body>
</html>
