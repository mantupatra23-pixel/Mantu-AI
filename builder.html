<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Builder</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:white;
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 20px;
    background:#020617;
    border-bottom:1px solid #1e293b;
}

.logo{
    font-weight:bold;
    color:#22c55e;
}

.tabs{
    display:flex;
    gap:12px;
    font-size:13px;
}

.tabs div{
    cursor:pointer;
    color:#94a3b8;
}

.tabs div:hover{
    color:white;
}

.publish{
    background:#22c55e;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

/* MAIN */
.main{
    display:flex;
    height:85vh;
}

/* LEFT PANEL */
.left{
    width:30%;
    padding:15px;
    background:#020617;
    border-right:1px solid #1e293b;
    overflow:auto;
}

/* RIGHT PANEL */
.right{
    flex:1;
    padding:15px;
}

/* PREVIEW */
.preview{
    background:#020617;
    border-radius:10px;
    padding:10px;
    height:60%;
    margin-bottom:10px;
}

/* CODE */
.code{
    background:black;
    color:#22c55e;
    padding:10px;
    border-radius:10px;
    height:35%;
    overflow:auto;
}

/* CHAT */
.chat{
    position:fixed;
    bottom:0;
    width:100%;
    background:#020617;
    padding:10px;
    display:flex;
    gap:10px;
}

.chat input{
    flex:1;
    padding:10px;
    border-radius:8px;
    border:none;
}

.chat button{
    background:#22c55e;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">

    <div class="logo">⚡ Mantu AI</div>

    <div class="tabs">
        <div id="project">Project</div>
        <div>Sandbox</div>
        <div>Environment</div>
        <div>Config</div>
        <div>Users</div>
        <div>Database</div>
        <div>Monitoring</div>
        <div>Logs</div>
        <div>Email</div>
        <div>Files</div>
    </div>

    <button class="publish" onclick="publish()">Publish</button>

</div>

<!-- MAIN -->
<div class="main">

    <!-- LEFT -->
    <div class="left">
        <h3>AI Output</h3>
        <p id="output">Generating...</p>
    </div>

    <!-- RIGHT -->
    <div class="right">

        <div class="preview">
            <h3>Preview</h3>
            <iframe src="/" width="100%" height="90%" style="border:none;border-radius:10px;"></iframe>
        </div>

        <div class="code" id="code">
# Code will appear here
        </div>

    </div>

</div>

<!-- CHAT -->
<div class="chat">
    <input id="msg" placeholder="Type message...">
    <button onclick="send()">Send</button>
</div>

<script>

// LOAD IDEA
let idea = localStorage.getItem("idea");
document.getElementById("project").innerText = idea || "AI Project";

// AUTO GENERATE
fetch("/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({idea: idea})
})
.then(res=>res.json())
.then(data=>{
    document.getElementById("output").innerText = data.result;
    document.getElementById("code").innerText = data.code;
});

// CHAT
function send(){
    let msg = document.getElementById("msg").value;

    fetch("/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("output").innerText += "\n\nAI: " + data.reply;
    });

    document.getElementById("msg").value="";
}

// PUBLISH
function publish(){
    alert("🚀 App Published!");
}

</script>

</body>
</html>
