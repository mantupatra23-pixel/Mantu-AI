<!DOCTYPE html>
<html>
<head>
<title>Mantu AI PRO</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#020617;
  color:white;
  height:100vh;
  display:flex;
}

/* LEFT */
.left{
  width:300px;
  background:#0f172a;
  display:flex;
  flex-direction:column;
  border-right:1px solid #1e293b;
  padding:10px;
  gap:8px;
}

.logo{
  font-weight:bold;
  padding-bottom:10px;
  border-bottom:1px solid #1e293b;
}

textarea,input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#4f46e5,#9333ea);
  color:white;
  cursor:pointer;
}

/* RIGHT */
.right{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TOPBAR */
.topbar{
  padding:10px;
  background:#0f172a;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #1e293b;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
}

#editor{
  width:50%;
  background:black;
  color:#00ff00;
  padding:10px;
  overflow:auto;
  outline:none;
}

iframe{
  flex:1;
  border:none;
}

.status{
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<!-- LEFT -->
<div class="left">

  <div class="logo">⚡ Mantu AI</div>

  <div id="status" class="status">Idle...</div>

  <textarea id="prompt" placeholder="Describe your app..."></textarea>
  <button onclick="generate()">⚡ Build App</button>

  <input id="fileName" placeholder="new file name">
  <button onclick="addFile()">➕ Add File</button>

  <input id="projectName" placeholder="Project Name">
  <button onclick="save()">💾 Save</button>
  <button onclick="load()">📂 Load</button>

  <textarea id="envInput" placeholder="KEY=VALUE"></textarea>
  <button onclick="saveEnv()">🔥 Save ENV</button>

  <input id="chatInput" placeholder="Ask AI...">
  <button onclick="chat()">🤖 Chat</button>

</div>

<!-- RIGHT -->
<div class="right">

  <div class="topbar">
    <div>Mantu Builder</div>
    <div id="topStatus" class="status">Ready</div>
    <div>
      <button onclick="download()">Export</button>
      <button onclick="deploy()">Deploy</button>
    </div>
  </div>

  <div class="main">
    <pre id="editor" contenteditable="true"></pre>
    <iframe id="preview"></iframe>
  </div>

</div>

<script>

let files = {
  "index.html":"<h1>Hello 🚀</h1>"
}

let currentFile="index.html"
let editor=document.getElementById("editor")
let preview=document.getElementById("preview")

function setStatus(msg){
  document.getElementById("status").innerText=msg
}

function setTopStatus(msg){
  document.getElementById("topStatus").innerText=msg
}

////////////////////////////////////////
//// 🚀 REAL AI STREAMING GENERATE ////
////////////////////////////////////////

async function generate(){
  let prompt=document.getElementById("prompt").value

  setStatus("🤖 AI Thinking...")
  setTopStatus("Streaming...")

  fetch("https://mantu-ai.onrender.com/stream",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({prompt})
})

  const reader = res.body.getReader()
  const decoder = new TextDecoder()

  let fullText = ""

  while(true){
    const {done, value} = await reader.read()
    if(done) break

    let chunk = decoder.decode(value)
    fullText += chunk

    editor.textContent = fullText   // 🔥 LIVE typing
  }

  setStatus("⚡ Parsing Code...")

  parseFiles(fullText)

  setStatus("✅ Done")
  setTopStatus("Ready")
}

////////////////////////////////////////
//// 📂 AUTO FILE SPLIT ////
////////////////////////////////////////

function parseFiles(text){

  let html = extract(text,"index.html")
  let css = extract(text,"style.css")
  let js = extract(text,"script.js")

  files = {
    "index.html": html || "<h1>No HTML</h1>",
    "style.css": css || "",
    "script.js": js || ""
  }

  openFile("index.html")
}

function extract(text, filename){
  let regex = new RegExp(filename+"[\\s\\S]*?```[a-z]*([\\s\\S]*?)```","i")
  let match = text.match(regex)
  return match ? match[1].trim() : ""
}

////////////////////////////////////////
//// 📂 FILE OPEN ////
////////////////////////////////////////

async function openFile(name){
  currentFile=name
  let content=files[name] || ""

  editor.textContent=""

  for(let i=0;i<content.length;i++){
    editor.textContent += content[i]
    await new Promise(r=>setTimeout(r,1))
  }

  updatePreview()
}

////////////////////////////////////////
//// ✏️ EDIT ////
////////////////////////////////////////

editor.oninput=()=>{
  files[currentFile]=editor.textContent
  updatePreview()
}

////////////////////////////////////////
//// 🖥 PREVIEW ////
////////////////////////////////////////

function updatePreview(){
  let html = files["index.html"] || ""
  let css = "<style>"+(files["style.css"] || "")+"</style>"

  let jsCode = files["script.js"] || ""
  jsCode = jsCode.replaceAll("</script>", "<\\/script>")

  let js = "<script>"+jsCode+"<\/script>"

  preview.srcdoc = html + css + js
}

////////////////////////////////////////
//// ➕ FILE ADD ////
////////////////////////////////////////

function addFile(){
  let name=document.getElementById("fileName").value
  if(name){
    files[name]=""
    openFile(name)
  }
}

////////////////////////////////////////
//// 💾 SAVE ////
////////////////////////////////////////

async function save(){
  let name=document.getElementById("projectName").value

  await fetch("/save_project",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name,files})
  })

  alert("Saved ✅")
}

////////////////////////////////////////
//// 📂 LOAD ////
////////////////////////////////////////

async function load(){
  let name=document.getElementById("projectName").value

  let res=await fetch("/load_project/"+name)
  let data=await res.json()

  files=data.files || {}
  openFile(Object.keys(files)[0])
}

////////////////////////////////////////
//// 🔥 ENV ////
////////////////////////////////////////

async function saveEnv(){
  let project=document.getElementById("projectName").value
  let raw=document.getElementById("envInput").value

  let env={}
  raw.split("\n").forEach(line=>{
    let [k,v]=line.split("=")
    if(k && v) env[k.trim()]=v.trim()
  })

  await fetch("/save_env",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({project,env})
  })

  alert("ENV Saved 🔥")
}

////////////////////////////////////////
//// 🤖 CHAT ////
////////////////////////////////////////

async function chat(){
  let msg=document.getElementById("chatInput").value

  let res=await fetch("/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  })

  let data=await res.json()

  files["index.html"] += "\n"+(data.reply || "")
  openFile("index.html")
}

////////////////////////////////////////
//// 📦 DOWNLOAD ////
////////////////////////////////////////

async function download(){
  let res=await fetch("/export_zip",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:"app",files})
  })

  let blob=await res.blob()
  let url=URL.createObjectURL(blob)

  let a=document.createElement("a")
  a.href=url
  a.download="app.zip"
  a.click()
}

////////////////////////////////////////
//// 🚀 DEPLOY ////
////////////////////////////////////////

async function deploy(){
  await fetch("/deploy/github",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:"app",files})
  })

  alert("Deploy 🚀")
}

////////////////////////////////////////
//// INIT ////
////////////////////////////////////////

window.onload=()=>{
  openFile("index.html")
}

</script>

</body>
</html>
