<!DOCTYPE html>
<html>
<head>
<title>Mantu AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:white;
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:#020617;
  padding:20px;
  border-right:1px solid #1e293b;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
}

/* LEFT PANEL */
.left{
  width:40%;
  padding:20px;
  border-right:1px solid #1e293b;
}

/* RIGHT PANEL */
.right{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  padding:10px;
  border-bottom:1px solid #1e293b;
}

/* PROMPT */
textarea{
  width:100%;
  height:120px;
  background:#020617;
  border:1px solid #1e293b;
  color:white;
  border-radius:10px;
  padding:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#3b82f6,#9333ea);
  color:white;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

/* FILE TABS */
#fileTabs button{
  width:auto;
  margin:5px;
  padding:6px 10px;
  background:#1e293b;
}

/* EDITOR */
#editor{
  width:100%;
  height:200px;
  background:black;
  color:#0f0;
  margin-top:10px;
}

/* PREVIEW */
iframe{
  flex:1;
  border:none;
  background:white;
}

/* CHAT */
.chat{
  margin-top:15px;
}

.chat input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#020617;
  color:white;
}

/* CHAT MSG */
.msg{
  background:#1e293b;
  padding:8px;
  border-radius:8px;
  margin-top:5px;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>⚡ Mantu AI</h2>
  <p style="color:#64748b">Bolt style builder</p>
</div>

<!-- MAIN -->
<div class="main">

<!-- LEFT -->
<div class="left">

<h3>Prompt</h3>

<textarea id="prompt" placeholder="What will you build today?"></textarea>

<select id="lang" style="width:100%;margin-top:10px;padding:10px;border-radius:10px;background:#020617;color:white;">
<option value="html">HTML</option>
<option value="fullstack">Full Stack</option>
<option value="python">Python</option>
</select>

<button onclick="generate()">⚡ Build</button>
<button onclick="fixCode()">🛠 Fix</button>
<button onclick="saveProject()">💾 Save</button>
<button onclick="downloadAll()">⬇ Download</button>

<!-- 🚀 DEPLOY BUTTON -->
<button onclick="deploy()">🚀 Deploy</button>

<div class="chat">
  <h4>AI Chat</h4>
  <div id="chatBox"></div>
  <input id="chatInput" placeholder="Ask AI...">
  <button onclick="chat()">Send</button>
</div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="header">Preview</div>

<iframe id="preview"></iframe>

<div id="fileTabs"></div>

<textarea id="editor"></textarea>

</div>

</div>

<script>

const BASE = "https://mantu-ai.onrender.com"

let files = {}
let currentFile = "index.html"

/* CHAT UI */
function addChat(type,text){
  const box = document.getElementById("chatBox")
  const div = document.createElement("div")
  div.className="msg"
  div.innerText = (type==="user"?"👤 ":"🤖 ") + text
  box.appendChild(div)
}

/* FILES */
function showFiles(){
  const tabs = document.getElementById("fileTabs")
  tabs.innerHTML=""

  Object.keys(files).forEach(name=>{
    const btn=document.createElement("button")
    btn.innerText=name

    btn.onclick=()=>{
      currentFile=name
      document.getElementById("editor").value=files[name]
    }

    tabs.appendChild(btn)
  })
}

/* GENERATE */
async function generate(){
  const prompt=document.getElementById("prompt").value
  const lang=document.getElementById("lang").value

  addChat("user",prompt)

  const res=await fetch(BASE+"/generate/code",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt,lang})
  })

  const data=await res.json()

  files=data.files||{"index.html":data.code}

  showFiles()

  document.getElementById("editor").value=files["index.html"]
  document.getElementById("preview").srcdoc=files["index.html"]

  addChat("ai","App generated 🚀")
}

/* FIX */
async function fixCode(){
  const res=await fetch(BASE+"/debug",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({code:files[currentFile]})
  })

  const data=await res.json()

  files[currentFile]=data.fixed
  document.getElementById("editor").value=data.fixed
}

/* SAVE */
function saveProject(){
  localStorage.setItem("project",JSON.stringify(files))
  alert("Saved")
}

/* DOWNLOAD */
function downloadAll(){
  let content=""
  for(let f in files){
    content+=`\n--- ${f} ---\n`+files[f]
  }

  const blob=new Blob([content])
  const a=document.createElement("a")
  a.href=URL.createObjectURL(blob)
  a.download="project.txt"
  a.click()
}

/* 🚀 DEPLOY */
async function deploy(){

  const name = prompt("Project name?") || "my-app"

  const res = await fetch(BASE + "/deploy", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      name: name,
      files: files
    })
  })

  const data = await res.json()

  const url = BASE + data.url

  alert("Live: " + url)

  window.open(url)
}

/* CHAT */
async function chat(){
  const prompt=document.getElementById("chatInput").value

  const res=await fetch(BASE+"/dev-chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      prompt,
      code:files[currentFile]
    })
  })

  const data=await res.json()

  files[currentFile]=data.updated_code
  document.getElementById("editor").value=data.updated_code

  addChat("user",prompt)
  addChat("ai","Updated 🔥")
}

</script>

</body>
</html>
