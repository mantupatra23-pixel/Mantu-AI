<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Builder</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f8fafc;
}

/* HEADER */
.header{
    padding:15px;
    background:white;
    border-bottom:1px solid #e2e8f0;
    display:flex;
    justify-content:space-between;
}

/* MAIN */
.main{
    padding:20px;
}

/* IDEA */
.idea{
    padding:15px;
    background:white;
    border-radius:10px;
    border:1px solid #e2e8f0;
}

/* BUTTON LINE */
.actions{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.actions button{
    padding:12px;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

.create{background:#f59e0b;}
.deploy{background:#10b981;}
.generate{background:#3b82f6;}
.full{background:#6366f1;}
.template{background:#ec4899;}
.track{background:#06b6d4;}

/* OUTPUT */
.output{
    margin-top:20px;
    background:#111827;
    color:#22c55e;
    padding:15px;
    border-radius:10px;
}

/* PREVIEW */
iframe{
    width:100%;
    height:300px;
    border:none;
    margin-top:15px;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="header">
    <div>⚡ Builder</div>
    <button onclick="goHome()">← Back</button>
</div>

<div class="main">

    <!-- IDEA -->
    <div class="idea" id="ideaBox"></div>

    <!-- BUTTONS -->
    <div class="actions">
        <button class="create" onclick="create()">Create</button>
        <button class="generate" onclick="generate()">Generate</button>
        <button class="full" onclick="full()">Full</button>
        <button class="deploy" onclick="deploy()">Deploy</button>
        <button class="template" onclick="template()">Template</button>
        <button class="track" onclick="track()">Track</button>
    </div>

    <div class="output" id="output">⚡ Ready...</div>

    <iframe id="frame"></iframe>

</div>

<script>

// Load idea
let idea = localStorage.getItem("idea");
document.getElementById("ideaBox").innerText = idea;

// CREATE
function create(){
    fetch("/create-project",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text:idea})
    })
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("output").innerText = data.msg;
    });
}

// GENERATE
function generate(){
    fetch("/generate",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text:idea})
    })
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("output").innerText = data.response;
    });
}

// FULL BUILD
function full(){
    fetch("/full-build",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text:idea})
    })
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("output").innerText = data.repo;
    });
}

// DEPLOY
function deploy(){
    fetch("/auto-deploy",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text:idea})
    })
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("output").innerText = data.msg;
    });
}

// TEMPLATE
function template(){
    fetch("/template",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text:idea})
    })
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("output").innerHTML = data.html;
    });
}

// TRACK
function track(){
    fetch("/deploy-logs")
    .then(res=>res.json())
    .then(data=>{
        document.getElementById("output").innerText = JSON.stringify(data.logs);
    });
}

function goHome(){
    window.location.href = "/";
}

</script>

</body>
</html>
