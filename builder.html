<!DOCTYPE html>
<html>
<head>
<title>Mantu AI Builder</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:sans-serif;
    display:flex;
    height:100vh;
    background:#f5f5f5;
}

/* LEFT PANEL */
.left{
    width:35%;
    background:#fff;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    overflow:auto;
}

/* RIGHT PANEL */
.right{
    flex:1;
    padding:10px;
}

/* INPUT */
textarea{
    width:100%;
    height:100px;
    border-radius:10px;
    border:1px solid #ddd;
    padding:10px;
    margin-bottom:10px;
}

/* BUTTON */
button{
    display:block;
    width:100%;
    margin:8px 0;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#000;
    color:#fff;
    cursor:pointer;
}

button:hover{
    transform:scale(1.03);
}

/* OUTPUT */
#output{
    width:100%;
    height:40%;
    background:#000;
    color:#0f0;
    padding:10px;
    overflow:auto;
    border-radius:10px;
}

/* PREVIEW */
iframe{
    width:100%;
    height:55%;
    border:none;
    border-radius:10px;
    background:#fff;
}

/* CHAT */
.chat{
    margin-top:15px;
}
</style>

</head>

<body>

<div class="left">

<h2>Prompt</h2>

<textarea id="prompt"></textarea>

<select id="lang">
<option value="html">HTML</option>
<option value="python">Python</option>
<option value="node">Node</option>
<option value="flutter">Flutter</option>
<option value="fullstack">Full Stack</option>
</select>

<button onclick="generate()">Generate</button>
<button onclick="preview()">Preview</button>
<button onclick="fixCode()">Fix Code</button>
<button onclick="runPython()">Run Python</button>
<button onclick="download()">Download</button>

<div class="chat">
<h3>Dev Chat</h3>
<input id="chatInput" placeholder="Ask AI..." style="width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;">
<button onclick="chat()">Send</button>
</div>

</div>

<div class="right">
<iframe id="previewFrame"></iframe>
<pre id="output"></pre>
</div>

<script>

let currentCode = ""

// 🔥 IMPORTANT BASE URL
const BASE = "https://mantu-ai.onrender.com"

/* GENERATE */
async function generate(){
  const prompt = document.getElementById("prompt").value
  const lang = document.getElementById("lang").value

  try{
    const res = await fetch(BASE + "/generate/code", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({prompt, lang})
    })

    const data = await res.json()
    currentCode = data.code
    document.getElementById("output").innerText = currentCode

  }catch(err){
    alert("Generate error")
  }
}

/* PREVIEW */
function preview(){
  const iframe = document.getElementById("previewFrame")
  iframe.srcdoc = currentCode
}

/* FIX CODE */
async function fixCode(){
  try{
    const res = await fetch(BASE + "/debug", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({code: currentCode})
    })

    const data = await res.json()
    currentCode = data.fixed
    document.getElementById("output").innerText = currentCode

  }catch(err){
    alert("Fix error")
  }
}

/* RUN PYTHON */
async function runPython(){
  try{
    const res = await fetch(BASE + "/run/python", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({code: currentCode})
    })

    const data = await res.json()
    alert(data.output || data.error)

  }catch(err){
    alert("Run error")
  }
}

/* DOWNLOAD */
function download(){
  const blob = new Blob([currentCode], {type:"text/plain"})
  const a = document.createElement("a")
  a.href = URL.createObjectURL(blob)
  a.download = "code.txt"
  a.click()
}

/* DEV CHAT */
async function chat(){
  const prompt = document.getElementById("chatInput").value

  try{
    const res = await fetch(BASE + "/dev-chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        prompt,
        code: currentCode
      })
    })

    const data = await res.json()
    currentCode = data.updated_code
    document.getElementById("output").innerText = currentCode

  }catch(err){
    alert("Chat error")
  }
}

</script>

</body>
</html>
