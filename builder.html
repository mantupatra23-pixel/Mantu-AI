<!DOCTYPE html>
<html>
<head>
<title>Mantu AI PRO</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f1a;
  color:white;
  height:100vh;
  display:flex;
}

/* LEFT PANEL (AI CHAT) */
.left{
  width:320px;
  background:#0f172a;
  display:flex;
  flex-direction:column;
  border-right:1px solid #1e293b;
}

.logo{
  padding:15px;
  font-weight:600;
  border-bottom:1px solid #1e293b;
}

/* CHAT AREA */
.chat-box{
  flex:1;
  padding:10px;
  overflow:auto;
}

.chat-input{
  padding:10px;
  border-top:1px solid #1e293b;
}

input{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
}

/* RIGHT SIDE */
.right{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* 🔥 TOP NAVBAR */
.topbar{
  height:60px;
  background:#0f172a;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  border-bottom:1px solid #1e293b;
}

.topbar .actions button{
  margin-left:10px;
  padding:8px 16px;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:white;
  cursor:pointer;
}

.topbar .actions button.primary{
  background:linear-gradient(90deg,#4f46e5,#9333ea);
}

/* MAIN CONTENT */
.main{
  flex:1;
  display:flex;
}

/* EDITOR */
.editor{
  width:50%;
  background:#020617;
  display:flex;
  flex-direction:column;
  border-right:1px solid #1e293b;
}

#tabs{
  display:flex;
  background:#0f172a;
  padding:5px;
}

.tab{
  padding:6px 10px;
  margin-right:5px;
  background:#1f2937;
  border-radius:6px;
  cursor:pointer;
}

.tab.active{
  background:#4f46e5;
}

#editor{
  flex:1;
  padding:10px;
  background:black;
  color:#00ff00;
  outline:none;
  white-space:pre;
}

/* PREVIEW */
.preview{
  flex:1;
  background:#0b0f1a;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

/* BUTTON */
button{
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LEFT AI PANEL -->
<div class="left">
  <div class="logo">Mantu AI</div>

  <div class="chat-box" id="chatBox">
    <p>Start building your app...</p>
  </div>

  <div class="chat-input">
    <input id="chatInput" placeholder="Build a SaaS app...">
  </div>
</div>

<!-- RIGHT -->
<div class="right">

  <!-- TOPBAR -->
  <div class="topbar">
    <div>Mantu Builder</div>

    <div class="actions">
      <button onclick="downloadZip()">Export</button>
      <button onclick="deployApp()">Deploy</button>
      <button class="primary" onclick="generateFiles()">Build</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- EDITOR -->
    <div class="editor">
      <div id="tabs"></div>
      <pre id="editor" contenteditable="true"></pre>
    </div>

    <!-- PREVIEW -->
    <div class="preview">
      <iframe id="preview"></iframe>
    </div>

  </div>

</div>

<script>

let files = {
  "index.html":"<h1>Hello 🚀</h1>",
  "style.css":"body{font-family:sans-serif}",
  "script.js":"console.log('hi')"
}

let currentFile="index.html"

/* GENERATE */
async function generateFiles(){
 let prompt=document.getElementById("chatInput").value

 let res=await fetch("/generate/files",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({prompt})
 })

 let data=await res.json()
 files=data.files || files

 openFile(Object.keys(files)[0])
 updatePreview()

 document.getElementById("chatBox").innerHTML += "<p>App Generated</p>"
}

/* TABS */
function renderTabs(){
 let tabs=""
 for(let f in files){
  tabs+=`<div class="tab ${f==currentFile?"active":""}" onclick="openFile('${f}')">${f}</div>`
 }
 tabsEl.innerHTML=tabs
}

function openFile(f){
 currentFile=f
 editor.textContent=files[f]
 renderTabs()
}

/* EDIT */
editor.oninput=()=>{
 files[currentFile]=editor.textContent
 updatePreview()
}

/* PREVIEW */
function updatePreview(){
 let html=files["index.html"]||""
 let css=`<style>${files["style.css"]||""}</style>`
 let js=`<script>${files["script.js"]||""}<\/script>`
 preview.srcdoc=html+css+js
}

/* EXPORT */
async function downloadZip(){
 let res=await fetch("/export_zip",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name:"app",files})
 })

 let blob=await res.blob()
 let url=URL.createObjectURL(blob)
 let a=document.createElement("a")
 a.href=url
 a.download="app.zip"
 a.click()
}

/* DEPLOY */
async function deployApp(){
 await fetch("/deploy/github",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name:"app",files})
 })

 window.location.href="/deploy/vercel?name=app"
}

/* INIT */
openFile("index.html")
updatePreview()

</script>

</body>
</html>
