<!DOCTYPE html>
<html>
<head>
<title>Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:sans-serif;background:#f9fafb;}
.container{display:flex;height:100vh;}
.left{width:35%;padding:20px;background:#fff;border-right:1px solid #eee;}
.right{flex:1;display:flex;flex-direction:column;}
textarea,select{width:100%;padding:10px;margin-top:10px;border-radius:10px;border:1px solid #ddd;}
button{margin-top:10px;padding:10px;border:none;border-radius:10px;cursor:pointer;}
iframe{flex:1;border:none;}
.output{height:150px;background:black;color:#22c55e;padding:10px;overflow:auto;}
.chat{height:150px;overflow:auto;border-top:1px solid #eee;padding:10px;}
</style>
</head>
<body>

<div class="container">

<div class="left">
<h3>Prompt</h3>
<textarea id="prompt"></textarea>

<select id="lang">
<option value="html">HTML</option>
<option value="python">Python</option>
<option value="node">Node</option>
<option value="flutter">Flutter</option>
<option value="fullstack">Full Stack</option>
</select>

<button onclick="generate()">Generate</button>
<button onclick="preview()">Preview</button>
<button onclick="debug()">Fix Code</button>
<button onclick="run()">Run Python</button>
<button onclick="download()">Download</button>

<h3>Dev Chat</h3>
<input id="chatInput" placeholder="Ask AI..." />
<button onclick="chat()">Send</button>

</div>

<div class="right">
<iframe id="frame"></iframe>
<div class="output" id="output"></div>
<div class="chat" id="chatBox"></div>
</div>

</div>

<script>
let currentCode="";
let projectName="ai-project";

async function generate(){
try{
let res=await fetch("http://localhost:8000/generate/code",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
prompt:document.getElementById("prompt").value,
lang:document.getElementById("lang").value
})
});
let data=await res.json();
currentCode=data.code;
document.getElementById("output").innerText=currentCode;
}catch(e){alert("error");}
}

function preview(){
document.getElementById("frame").srcdoc=currentCode;
}

async function debug(){
let res=await fetch("http://localhost:8000/debug",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({code:currentCode})
});
let data=await res.json();
currentCode=data.fixed;
document.getElementById("output").innerText=currentCode;
}

async function run(){
let res=await fetch("http://localhost:8000/run/python",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({code:currentCode})
});
let data=await res.json();
document.getElementById("output").innerText=data.output||data.error;
}

function download(){
window.open(`http://localhost:8000/download/${projectName}`);
}

async function chat(){
let msg=document.getElementById("chatInput").value;

let res=await fetch("http://localhost:8000/dev-chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
prompt:msg,
code:currentCode
})
});

let data=await res.json();

currentCode=data.updated_code;

document.getElementById("chatBox").innerHTML+=`<p>👤 ${msg}</p><p>🤖 Updated</p>`;
document.getElementById("output").innerText=currentCode;
}
</script>

</body>
</html>
