<!DOCTYPE html>
<html>
<head>
<title>Mantu AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#ffffff;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.logo{
  font-weight:bold;
  font-size:18px;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
}

.hero h1{
  font-size:36px;
  margin-bottom:20px;
}

/* BUTTON */
.btn{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:black;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

/* FEATURES */
.features{
  padding:40px;
}

.card{
  background:#f5f5f5;
  padding:20px;
  margin:10px;
  border-radius:12px;
  text-align:center;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  color:#888;
}
</style>

</head>

<body>

<div class="nav">
  <div class="logo">⚡ Mantu AI</div>
</div>

<div class="hero">
  <h1>Build Apps with AI Instantly</h1>
  <button class="btn" onclick="go()">Start</button>
</div>

<div class="features">
  <div class="card">AI Code Generation</div>
  <div class="card">Live Preview</div>
  <div class="card">Deploy & Download</div>
</div>

<div class="footer">© 2026 Mantu AI</div>

<script>
function go(){
  window.location.href = "/start";   // 🔥 FIX HERE
}
</script>

</body>
</html>
