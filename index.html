<!DOCTYPE html>
<html>
<head>
<title>Projects</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:sans-serif;background:#f9fafb;padding:20px;}
.card{background:#fff;padding:20px;margin:10px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.05);}
button{margin-top:10px;padding:8px 12px;border:none;border-radius:10px;background:black;color:white;}
</style>
</head>
<body>

<h2>Your Projects</h2>
<div id="list"></div>

<script>

async function load(){
let res=await fetch("http://localhost:8000/projects");
let data=await res.json();

let html="";
data.projects.forEach(p=>{
html+=`
<div class="card">
<h3>${p.name}</h3>
<p>${p.prompt}</p>
<button onclick="openProject('${p.name}')">Open</button>
</div>
`;
});

document.getElementById("list").innerHTML=html;
}

function openProject(name){
window.open(`/apps/${name}/index.html`);
}

load();
</script>

</body>
</html>
