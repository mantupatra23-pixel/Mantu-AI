<!DOCTYPE html>
<html>
<head>
<title>Mantu AI</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    margin:0;
}

h2{
    text-align:center;
    padding:15px;
}

#chat{
    height:70vh;
    overflow-y:auto;
    padding:10px;
}

.msg{
    margin:10px;
    padding:10px;
    border-radius:10px;
    max-width:80%;
}

.user{
    background:#2563eb;
    margin-left:auto;
}

.ai{
    background:#1e293b;
}

.bottom{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    padding:10px;
    background:#020617;
}

input{
    flex:1;
    padding:10px;
    border:none;
    outline:none;
    border-radius:8px;
}

button{
    margin-left:10px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    font-weight:bold;
}
</style>

</head>

<body>

<h2>🤖 Mantu AI Chat</h2>

<div id="chat"></div>

<div class="bottom">
    <input id="prompt" placeholder="Type message..."/>
    <button onclick="send()">Send</button>
</div>

<script>

async function send(){
    let input = document.getElementById("prompt");
    let text = input.value;

    if(!text) return;

    let chat = document.getElementById("chat");

    // user message
    chat.innerHTML += `<div class="msg user">You: ${text}</div>`;

    input.value = "";

    // scroll down
    chat.scrollTop = chat.scrollHeight;

    let res = await fetch("/generate",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})
    });

    let data = await res.json();

    // AI message
    chat.innerHTML += `<div class="msg ai">AI: ${data.response}</div>`;

    chat.scrollTop = chat.scrollHeight;
}

// Enter press support
document.getElementById("prompt").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        send();
    }
});

</script>

</body>
</html>
