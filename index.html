<!DOCTYPE html>
<html>
<head>
<title>Mantu AI Builder</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    height:100vh;
}

/* LEFT */
.left{
    width:35%;
    padding:20px;
    background:#111827;
    overflow:auto;
}

/* RIGHT */
.right{
    flex:1;
    padding:10px;
}

/* INPUT */
textarea{
    width:100%;
    height:120px;
    border-radius:10px;
    border:none;
    padding:10px;
    margin-bottom:10px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#3b82f6,#9333ea);
    color:white;
    cursor:pointer;
}

/* CHAT */
.chat-box{
    margin-top:15px;
}

.chat-msg{
    background:#1f2937;
    padding:10px;
    border-radius:10px;
    margin:5px 0;
}

/* OUTPUT */
#output{
    height:40%;
    background:#000;
    color:#0f0;
    padding:10px;
    overflow:auto;
    border-radius:10px;
}

/* PREVIEW */
iframe{
    width:100%;
    height:55%;
    border:none;
    border-radius:10px;
    background:white;
}
</style>
</head>

<body>

<div class="left">

<h2>⚡ Mantu AI</h2>

<textarea id="prompt" placeholder="What will you build today?"></textarea>

<select id="lang">
<option value="html">HTML</option>
<option value="python">Python</option>
<option value="node">Node</option>
<option value="fullstack">Full Stack</option>
</select>

<button onclick="generate()">Build</button>
<button onclick="fixCode()">Fix Code</button>
<button onclick="download()">Download</button>

<div class="chat-box" id="chatBox"></div>

<input id="chatInput" placeholder="Ask AI..." />
<button onclick="chat()">Send</button>

</div>

<div class="right">
<iframe id="preview"></iframe>
<pre id="output"></pre>
</div>

<script>
const BASE = "https://mantu-ai.onrender.com"
let currentCode = ""

/* GENERATE */
async function generate(){
  const prompt = document.getElementById("prompt").value
  const lang = document.getElementById("lang").value

  const res = await fetch(BASE + "/generate/code", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({prompt, lang})
  })

  const data = await res.json()
  currentCode = data.code

  document.getElementById("output").innerText = currentCode
  document.getElementById("preview").srcdoc = currentCode

  addChat("user", prompt)
  addChat("ai", "Code Generated 🚀")
}

/* FIX */
async function fixCode(){
  const res = await fetch(BASE + "/debug", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({code: currentCode})
  })

  const data = await res.json()
  currentCode = data.fixed

  document.getElementById("output").innerText = currentCode
  document.getElementById("preview").srcdoc = currentCode

  addChat("ai","Code Fixed ✅")
}

/* CHAT */
async function chat(){
  const prompt = document.getElementById("chatInput").value

  const res = await fetch(BASE + "/dev-chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({prompt, code: currentCode})
  })

  const data = await res.json()
  currentCode = data.updated_code

  document.getElementById("output").innerText = currentCode
  document.getElementById("preview").srcdoc = currentCode

  addChat("user", prompt)
  addChat("ai","Updated 🔥")
}

/* CHAT UI */
function addChat(type,text){
  const box = document.getElementById("chatBox")
  const div = document.createElement("div")
  div.className="chat-msg"
  div.innerText = (type==="user"?"👤 ":"🤖 ") + text
  box.appendChild(div)
}

/* DOWNLOAD */
function download(){
  const blob = new Blob([currentCode], {type:"text/html"})
  const a = document.createElement("a")
  a.href = URL.createObjectURL(blob)
  a.download = "project.html"
  a.click()
}
</script>

</body>
</html>
