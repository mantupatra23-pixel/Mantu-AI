<!DOCTYPE html>
<html>
<head>
<title>Mantu AI</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at center, #0f172a, #020617);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
}

/* LOGO */
.logo{
  position:absolute;
  top:20px;
  left:20px;
  font-weight:bold;
  font-size:18px;
}

/* HEADING */
h1{
  font-size:32px;
  font-weight:600;
}

h1 span{
  color:#60a5fa;
}

/* PROMPT BOX */
.prompt-box{
  margin-top:20px;
  background:#111827;
  border:1px solid #1f2937;
  padding:15px;
  border-radius:14px;
  width:90%;
  max-width:500px;
  box-shadow:0 0 40px rgba(59,130,246,0.2);
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  background:#020617;
  border:none;
  outline:none;
  color:white;
  border-radius:8px;
}

/* BUTTON */
button{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#3b82f6,#9333ea);
  color:white;
  cursor:pointer;
  font-weight:bold;
}

/* FOOTER */
.footer{
  position:absolute;
  bottom:10px;
  font-size:12px;
  color:#94a3b8;
}
</style>

</head>

<body>

<div class="logo">⚡ Mantu AI</div>

<h1>What will you <span>build</span> today?</h1>

<div class="prompt-box">
  <input id="prompt" placeholder="Build a SaaS app, portfolio, dashboard..." />
  <button onclick="goBuilder()">⚡ Build now</button>
</div>

<div class="footer">
  Powered by Mantu AI 🚀
</div>

<script>
function goBuilder(){
  let text=document.getElementById("prompt").value
  localStorage.setItem("prompt",text)
  window.location.href="/builder"
}
</script>

</body>
</html>
