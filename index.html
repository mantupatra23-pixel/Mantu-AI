<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mantu AI</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f8fafc;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    background:white;
    border-bottom:1px solid #e2e8f0;
}

.logo{
    font-weight:bold;
}

/* INPUT SECTION */
.top-box{
    padding:20px;
    background:white;
    border-bottom:1px solid #e2e8f0;
}

.input-area{
    display:flex;
    gap:10px;
}

.input-area input{
    flex:1;
    padding:14px;
    border-radius:10px;
    border:1px solid #ddd;
}

.input-area button{
    padding:14px 20px;
    border:none;
    background:#6366f1;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

/* APPS LIST */
.apps{
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    border:1px solid #e2e8f0;
    margin-bottom:15px;
}

.card h3{
    margin:0;
}

.status{
    font-size:12px;
    color:green;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">⚡ Mantu AI</div>
    <button onclick="goDashboard()">Dashboard</button>
</div>

<!-- TOP INPUT -->
<div class="top-box">
    <div class="input-area">
        <input id="idea" placeholder="Create with Mantu AI...">
        <button onclick="generate()">Generate</button>
    </div>
</div>

<!-- APPS LIST -->
<div class="apps" id="apps">

    <div class="card">
        <h3>AI SaaS Builder</h3>
        <p class="status">● Running</p>
    </div>

</div>

<script>

function generate(){
    let idea = document.getElementById("idea").value;

    // Save idea (optional)
    localStorage.setItem("idea", idea);

    // Redirect to builder page
    window.location.href = "/builder.html";
}

function goDashboard(){
    window.location.href = "/builder.html";
}

</script>

</body>
</html>
