<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mantu AI</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f8fafc;
}

/* TOP NAV */
.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 20px;
    background:white;
    border-bottom:1px solid #e2e8f0;
}

.tabs{
    display:flex;
    gap:15px;
    font-size:14px;
}

.tabs div{
    cursor:pointer;
    color:#555;
}

.tabs div:hover{
    color:black;
}

.create-btn{
    padding:8px 12px;
    background:#6366f1;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

/* CONTENT */
.container{
    padding:20px;
}

/* APP CARD */
.card{
    background:white;
    padding:15px;
    border-radius:10px;
    border:1px solid #e2e8f0;
    margin-bottom:15px;
}

.status{
    color:green;
    font-size:12px;
}

/* INPUT BOX */
.input-box{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:600px;
    background:white;
    padding:10px;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,0.1);
    display:flex;
    gap:10px;
}

.input-box input{
    flex:1;
    padding:12px;
    border:none;
    outline:none;
}

.input-box button{
    background:#6366f1;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
    <div class="tabs">
        <div>Applications</div>
        <div>Members</div>
        <div>Billing</div>
        <div>Usage</div>
        <div>Settings</div>
    </div>

    <button class="create-btn">Create Application</button>
</div>

<!-- CONTENT -->
<div class="container">

    <h3>Applications (1)</h3>

    <div class="card">
        <b>AI SaaS Builder</b>
        <p class="status">● Running</p>
    </div>

</div>

<!-- PROMPT BOX -->
<div class="input-box">
    <input id="idea" placeholder="Create with Mantu AI...">
    <button onclick="generate()">↑</button>
</div>

<script>

// ENTER PRESS
document.getElementById("idea").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        generate();
    }
});

// GENERATE → NEXT PAGE
function generate(){
    let idea = document.getElementById("idea").value;

    if(!idea){
        alert("Enter idea first");
        return;
    }

    // SAVE IDEA
    localStorage.setItem("idea", idea);

    // GO BUILDER
    window.location.href = "/builder.html";
}

</script>

</body>
</html>
