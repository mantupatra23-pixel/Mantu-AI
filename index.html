<!DOCTYPE html>
<html>
<head>
<title>Mantu AI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* 🌌 BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

.bg span{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  opacity:0.3;
  animation:move 20s linear infinite;
}

@keyframes move{
  from{transform:translateY(0)}
  to{transform:translateY(-1000px)}
}

/* 🔥 NAVBAR */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  align-items:center;
}

.logo{
  font-weight:600;
  font-size:18px;
}

.nav button{
  width:auto;
  padding:8px 16px;
}

/* HERO */
.hero{
  text-align:center;
  margin-top:80px;
}

.hero h1{
  font-size:42px;
}

.hero span{
  background:linear-gradient(90deg,#60a5fa,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* INPUT */
.input-box{
  margin:30px auto;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  padding:20px;
  border-radius:14px;
  width:450px;
  box-shadow:0 0 80px rgba(79,70,229,0.4);
}

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#020617;
  color:white;
}

button{
  margin-top:10px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#4f46e5,#9333ea);
  color:white;
  cursor:pointer;
}

/* FEATURES */
.features{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:80px;
  flex-wrap:wrap;
}

.card{
  width:220px;
  padding:20px;
  background:#0f172a;
  border-radius:12px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 0 20px #4f46e5;
}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:100px;
  padding:20px;
  opacity:0.6;
}

/* GLOW */
.glow{
  position:absolute;
  bottom:-200px;
  width:900px;
  height:400px;
  background: radial-gradient(circle, rgba(59,130,246,0.6), transparent 70%);
  filter: blur(120px);
}

</style>
</head>

<body>

<!-- 🌌 BACKGROUND -->
<div class="bg">
  <span style="left:10%"></span>
  <span style="left:20%"></span>
  <span style="left:30%"></span>
  <span style="left:40%"></span>
  <span style="left:50%"></span>
  <span style="left:60%"></span>
  <span style="left:70%"></span>
  <span style="left:80%"></span>
  <span style="left:90%"></span>
</div>

<!-- NAVBAR -->
<div class="nav">
  <div class="logo">⚡ Mantu AI</div>
  <button>Login</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Build your <span>AI App</span> instantly</h1>

  <div class="input-box">
    <input id="prompt" placeholder="Describe your app idea...">
    <button onclick="goBuilder()">⚡ Build now</button>
  </div>
</div>

<!-- FEATURES -->
<div class="features">

<div class="card">
  ⚡ Fast Build  
  <p>Generate apps instantly</p>
</div>

<div class="card">
  🤖 AI Powered  
  <p>Smart automation</p>
</div>

<div class="card">
  🚀 Deploy  
  <p>One-click deploy</p>
</div>

</div>

<div class="glow"></div>

<div class="footer">© 2026 Mantu AI 🚀</div>

<script>
function goBuilder(){
  let p=document.getElementById("prompt").value
  window.location.href="/builder?prompt="+encodeURIComponent(p)
}
</script>

</body>
</html>
