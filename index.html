<!DOCTYPE html>
<html>
<head>
<title>Mantu AI</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f8fafc;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:20px;
    border-radius:12px;
    width:90%;
    max-width:400px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #e2e8f0;
    margin-top:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:black;
    color:white;
    font-weight:bold;
}

.loader{
    text-align:center;
    margin-top:10px;
    display:none;
}
</style>

</head>

<body>

<div class="box">

<h2>⚡ Mantu AI</h2>

<input id="prompt" placeholder="Build app (e.g. blog app)">

<button onclick="generate()">🚀 Generate App</button>

<div class="loader" id="loader">⏳ Building your app...</div>

</div>

<script>

async function generate(){
 let text=document.getElementById("prompt").value;

 if(!text){
  alert("Enter idea first");
  return;
 }

 document.getElementById("loader").style.display="block";

 // Step 1: generate project
 await fetch("/generate-full-project",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({text})
 });

 // Step 2: redirect
 setTimeout(()=>{
   window.location.href="/landing";
 },1500);
}

</script>

</body>
</html>
